<!DOCTYPE html>
<html>
  <head>
    <title>URL Shortener Microservice</title>
    <link rel="shortcut icon" href="https://cdn.hyperdev.com/us-east-1%3A52a203ff-088b-420f-81be-45bf559d01b1%2Ffavicon.ico" type="image/x-icon"/>
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet" type="text/css">
    <link href="style.css" rel="stylesheet" type="text/css">
  </head>
  <body>
    <div class="container">
      <h1>URL Shortener Microservice</h1>

      <h2>API Usage:</h2>
      <p>POST <code>/api/shorturl</code> with body <code>url=https://www.example.com</code></p>
      <p>GET <code>/api/shorturl/&lt;short_url&gt;</code> — redirects to original URL</p>

      <h2>Example Response:</h2>
      <p><code>{ "original_url": "https://freeCodeCamp.org", "short_url": 1 }</code></p>

      <h2>Try it:</h2>
      <form action="/api/shorturl" method="POST">
        <input type="url" name="url" placeholder="https://www.example.com" required style="width:300px;padding:6px;">
        <button type="submit" style="padding:6px 12px;">Shorten</button>
      </form>
    </div>
    <div class="footer">
      <p>by <a href="https://www.freecodecamp.org">freeCodeCamp</a></p>
    </div>
  </body>
</html>
